# ─────────────────────────────────────────────────────────────────────────────
# LibAnyar — CircleCI Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Builds the C++ core library + tests, and validates the JS bridge compiles.
# Uses Ubuntu 22.04 (matches dev environment).
#
# C++ dependencies (Boost 1.81, SOCI 4.0.3, LibAsyik) are built from source
# and stored in a single /usr/local cache to avoid CircleCI glob limitations.
# ─────────────────────────────────────────────────────────────────────────────

version: 2.1

# ── Jobs ─────────────────────────────────────────────────────────────────────

jobs:
  build-and-test:
    docker:
      - image: ubuntu:22.04
    resource_class: medium
    environment:
      DEBIAN_FRONTEND: noninteractive
      CMAKE_BUILD_TYPE: Release
    steps:
      - checkout

      # ── System packages + CMake 3.28 ──────────────────────────────────
      - run:
          name: Install system packages + CMake 3.28
          command: |
            apt-get update -y
            apt-get install -y \
              build-essential git wget curl unzip pkg-config \
              libssl-dev libsqlite3-dev libpq-dev \
              libgtk-3-dev libwebkit2gtk-4.0-dev \
              gstreamer1.0-plugins-bad \
              libappindicator3-dev libnotify-dev \
              nlohmann-json3-dev \
              xvfb mesa-utils
            # CMake 3.28: knows Boost 1.81 and still has FindBoost
            # (3.22 too old, 4.x removed FindBoost entirely)
            wget -q https://github.com/Kitware/CMake/releases/download/v3.28.6/cmake-3.28.6-linux-x86_64.tar.gz
            mkdir -p /opt/cmake
            tar -xzf cmake-3.28.6-linux-x86_64.tar.gz -C /opt/cmake --strip-components=1
            ln -sf /opt/cmake/bin/cmake  /usr/local/bin/cmake
            ln -sf /opt/cmake/bin/ctest  /usr/local/bin/ctest
            ln -sf /opt/cmake/bin/cpack  /usr/local/bin/cpack
            echo "CMake version: $(cmake --version | head -1)"

      # ── Restore combined C++ dependency cache ─────────────────────────
      #    All of Boost, SOCI, LibAsyik install to /usr/local.
      #    CircleCI cache paths don't support globs, so we cache the
      #    entire /usr/local/lib and /usr/local/include directories.
      - restore_cache:
          keys:
            - cpp-deps-v3-{{ arch }}

      # ── Boost 1.81 ────────────────────────────────────────────────────
      - run:
          name: "Build Boost 1.81 (if not cached)"
          command: |
            if [ -f /usr/local/include/boost/version.hpp ] && \
               [ -f /usr/local/lib/libboost_fiber.a ]; then
              echo "Boost 1.81 already installed (cached)"
              ldconfig
              exit 0
            fi
            cd /tmp
            wget -q https://sourceforge.net/projects/boost/files/boost/1.81.0/boost_1_81_0.tar.gz
            tar -zxf boost_1_81_0.tar.gz
            cd boost_1_81_0
            ./bootstrap.sh
            ./b2 -j$(nproc) cxxflags="-std=c++17" \
                 --with-fiber --with-context --with-atomic \
                 --with-date_time --with-filesystem --with-url \
                 link=static,shared install
            ldconfig

      # ── SOCI 4.0.3 ───────────────────────────────────────────────────
      - run:
          name: "Build SOCI 4.0.3 (if not cached)"
          command: |
            if [ -f /usr/local/lib/cmake/SOCI/SOCIConfig.cmake ]; then
              echo "SOCI 4.0.3 already installed (cached)"
              ldconfig
              exit 0
            fi
            cd /tmp
            wget -q https://github.com/SOCI/soci/archive/refs/tags/v4.0.3.zip
            unzip -q v4.0.3.zip
            cd soci-4.0.3 && mkdir build && cd build
            cmake .. \
              -DSOCI_WITH_BOOST=ON \
              -DSOCI_WITH_POSTGRESQL=ON \
              -DSOCI_WITH_SQLITE3=ON \
              -DCMAKE_CXX_STANDARD=17 \
              -DSOCI_CXX11=ON
            make -j$(nproc)
            make install
            ldconfig

      # ── LibAsyik ──────────────────────────────────────────────────────
      - run:
          name: "Build LibAsyik (if not cached)"
          command: |
            if [ -f /usr/local/lib/cmake/libasyik/libasyik-config.cmake ]; then
              echo "LibAsyik already installed (cached)"
              ldconfig
              exit 0
            fi
            cd /tmp
            git clone --branch 1.6.1 --depth=1 https://github.com/okyfirmansyah/libasyik libasyik-src
            cd libasyik-src
            git submodule update --init --recursive
            mkdir build_ci && cd build_ci
            cmake .. \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_CXX_STANDARD=17 \
              -DLIBASYIK_ENABLE_SOCI=ON
            make -j2
            make install
            ldconfig

      # ── Save combined C++ dependency cache ────────────────────────────
      - save_cache:
          key: cpp-deps-v3-{{ arch }}
          paths:
            - /usr/local/lib
            - /usr/local/include

      # ── Node.js 20 ───────────────────────────────────────────────────
      - run:
          name: Install Node.js 20
          command: |
            if command -v node &>/dev/null; then
              echo "Node.js $(node --version) already available"
            else
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi

      # ── Build JS bridge ──────────────────────────────────────────────
      - restore_cache:
          keys:
            - npm-js-bridge-{{ checksum "js-bridge/package-lock.json" }}
            - npm-js-bridge-
      - run:
          name: "JS Bridge: install & build"
          command: |
            cd js-bridge
            npm ci
            npm run build
      - save_cache:
          key: npm-js-bridge-{{ checksum "js-bridge/package-lock.json" }}
          paths:
            - js-bridge/node_modules

      # ── Build C++ core + tests ───────────────────────────────────────
      - run:
          name: "C++: Configure (CMake)"
          command: |
            mkdir -p build
            cd build
            cmake .. \
              -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} \
              -DANYAR_BUILD_TESTS=ON \
              -DANYAR_BUILD_EXAMPLES=OFF \
              -DANYAR_BUILD_CLI=OFF
      - run:
          name: "C++: Build"
          command: |
            cd build
            make -j4
      - run:
          name: "C++: Run unit tests"
          command: |
            cd build
            ctest --output-on-failure \
                  --exclude-regex "test_webgl_canvas" \
                  --timeout 60
      - run:
          name: "C++: Run WebGL E2E test (xvfb)"
          command: |
            cd build
            xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" \
              ctest --output-on-failure \
                    --tests-regex "test_webgl_canvas" \
                    --timeout 60

      # ── Store test results ───────────────────────────────────────────
      - store_test_results:
          path: build/Testing
      - store_artifacts:
          path: build/Testing/Temporary/LastTest.log
          destination: test-log

  js-bridge-typecheck:
    docker:
      - image: node:20-slim
    resource_class: small
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-js-bridge-{{ checksum "js-bridge/package-lock.json" }}
            - npm-js-bridge-
      - run:
          name: "JS Bridge: install & typecheck"
          command: |
            cd js-bridge
            npm ci
            npm run build
      - run:
          name: "JS Bridge: unit tests (Vitest)"
          command: |
            cd js-bridge
            npm test
      - save_cache:
          key: npm-js-bridge-{{ checksum "js-bridge/package-lock.json" }}
          paths:
            - js-bridge/node_modules

# ── Workflows ────────────────────────────────────────────────────────────────

workflows:
  version: 2
  build-test:
    jobs:
      - build-and-test
      - js-bridge-typecheck